services:
  php-fpm:
    build:
      context: .
      target: base
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - php-fpm
    volumes:
      - .:/app:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app-network

networks:
  app-network: